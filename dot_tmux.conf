set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g status-style "bg=terminal"
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# general behaviour
set -g history-limit 50000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g focus-events on
set -g display-time 2000
set -g display-panes-time 2000
set -sg escape-time 10
set -g mouse on
set-window-option -g mode-keys vi

# splits
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# reload
unbind r
bind r source-file ~/.tmux.conf \; display "reloaded"

# resize
bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5
bind m resize-pane -Z

# C-l clear-screen (since vim-tmux-navigator eats it)
bind C-l send-keys 'C-l'

# attach to current pane path
bind M-c attach-session -c "#{pane_current_path}"

# fzf session switcher popup
bind o display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --reverse | xargs -r tmux switch-client -t"

# copy mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# tpm plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'catppuccin/tmux'

# status left
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_mantle},bold]  #S },#{#[bg=#{@thm_mantle},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "

# status right
set -g status-right-length 100
set -g status-right ""
# battery only on machines that have one (Linux laptops); skipped on PC/macOS
if-shell '[ -d /sys/class/power_supply/BAT0 ] || [ -d /sys/class/power_supply/BAT1 ]' \
  'set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_mantle}]},#{#[bg=#{@thm_mantle},fg=#{@thm_pink}]}} #{battery_icon} #{battery_percentage} "; set -ga status-right "#[bg=#{@thm_mantle},fg=#{@thm_overlay_0}, none]│"'
set -ga status-right "#[bg=#{@thm_mantle}]#{?#{==:#{online_status},ok},#[fg=#{@thm_mauve}] #(~/.tmux/net-icon.sh) on ,#[fg=#{@thm_red}]#[reverse] 󰖪 off }"
set -ga status-right "#[bg=#{@thm_mantle},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_mantle},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# window style
set -wg automatic-rename on
set -g automatic-rename-format ''
set -g window-status-separator '|'
set -g status-justify 'absolute-centre'
set -g @catppuccin_window_status_style 'custom'
set -g @catppuccin_window_flags ""
set -g @catppuccin_window_number ""
set -g @catppuccin_window_text "#[fg=#{@thm_rosewater},bg=#{@thm_mantle}] #I#{?#{!=:#{window_name},},: #W ,}"
set -g @catppuccin_window_current_number ""
set -g @catppuccin_window_current_text "#[fg=#{@thm_mantle},bg=#{@thm_peach}] #I#{?#{!=:#{window_name},},: #W ,}"

# online plugin icons
set -g @online_icon "ok"
set -g @offline_icon "nok"

# resurrect + continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# tpm init — keep at very bottom
run '~/.tmux/plugins/tpm/tpm'
